services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ecommerce-api-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      mailpit:
        condition: service_started
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ecommerce}
      DB_USERNAME: ${DB_USERNAME:-ecommerce}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      REDIS_HOST: redis
      CACHE_STORE: ${CACHE_STORE:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change_me}
    expose:
      - "9000"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ecommerce}
      MYSQL_USER: ${DB_USERNAME:-ecommerce}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-change_me_root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change_me}
    ports:
      - "${RABBITMQ_FORWARD_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_FORWARD_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "${MAILPIT_FORWARD_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_FORWARD_PORT:-1025}:1025"

volumes:
  mysql-data:
  rabbitmq-data:
